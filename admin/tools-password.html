<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Генератор хешей паролей — META College</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Onest:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/styles.css">
  <link rel="stylesheet" href="../assets/css/admin.css">
</head>
<body class="admin-login-page">
  <div class="login-wrap" style="max-width: 640px;">
    <div class="login-card">
      <h1 class="h-2" style="font-size: 26px; margin-bottom: 8px;">Генератор пользователей</h1>
      <p class="lead" style="font-size: 14.5px; margin-bottom: 24px;">Заполни поля → скопируй JSON и вставь в Vercel → Settings → Environment Variables → переменную <code>ADMIN_USERS_JSON</code>.</p>

      <form id="form" class="login-form">
        <div class="field">
          <label>Имя</label>
          <input type="text" name="name" required placeholder="Айгуль Сарсенова">
        </div>
        <div class="field">
          <label>Email</label>
          <input type="email" name="email" required placeholder="admin@meta-college.kz">
        </div>
        <div class="field">
          <label>Пароль</label>
          <input type="text" name="password" required minlength="8" placeholder="минимум 8 символов">
        </div>
        <div class="field">
          <label>Роль</label>
          <select name="role">
            <option value="admin">Администратор (всё)</option>
            <option value="editor" selected>Редактор (новости/блог/выпускники/преподаватели)</option>
          </select>
        </div>
        <button type="submit" class="btn btn-primary btn-lg" id="submit-btn" style="width:100%; justify-content:center;">Сгенерировать</button>
      </form>

      <div id="out" hidden style="margin-top: 24px;">
        <label style="font-size: 13px; font-weight: 600; margin-bottom: 8px; display: block;">
          Готовая запись (вставь это значение в Vercel → <code>ADMIN_USERS_JSON</code>):
        </label>
        <textarea id="json" readonly style="width: 100%; min-height: 180px; padding: 14px; background: var(--bg-soft); border: 1px solid var(--border); border-radius: var(--r-sm); font-family: ui-monospace,Menlo,monospace; font-size: 13px;"></textarea>
        <button id="copy" class="btn btn-ghost" style="margin-top: 10px;">📋 Скопировать</button>
        <p style="font-size: 12px; color: var(--muted); margin-top: 12px;">
          Чтобы добавить ещё одного пользователя — заполни форму снова и нажми «Сгенерировать». Все накапливаются в JSON выше.
        </p>
      </div>
    </div>
  </div>

  <script>
    const form = document.getElementById('form');
    const out = document.getElementById('out');
    const txt = document.getElementById('json');
    const btn = document.getElementById('submit-btn');
    const allUsers = [];

    function bufToHex(buf) {
      return Array.from(new Uint8Array(buf)).map((b) => b.toString(16).padStart(2, '0')).join('');
    }

    // PBKDF2-SHA256, 200000 iterations, 64-byte hash — соответствует серверному verifyPassword
    async function pbkdf2Hash(password, salt) {
      const enc = new TextEncoder();
      const keyMaterial = await crypto.subtle.importKey(
        'raw',
        enc.encode(String(password).normalize('NFKC')),
        { name: 'PBKDF2' },
        false,
        ['deriveBits']
      );
      const bits = await crypto.subtle.deriveBits(
        { name: 'PBKDF2', salt, iterations: 200000, hash: 'SHA-256' },
        keyMaterial,
        64 * 8
      );
      return new Uint8Array(bits);
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      btn.disabled = true; btn.textContent = 'Хешируем…';
      try {
        const fd = new FormData(form);
        const password = fd.get('password');
        const salt = crypto.getRandomValues(new Uint8Array(16));
        const hash = await pbkdf2Hash(password, salt);
        const stored = `pbkdf2:200000:${bufToHex(salt)}:${bufToHex(hash)}`;
        const user = {
          email: String(fd.get('email')).trim().toLowerCase(),
          name: String(fd.get('name')).trim(),
          role: fd.get('role'),
          password: stored,
        };
        allUsers.push(user);
        txt.value = JSON.stringify(allUsers, null, 2);
        out.hidden = false;
        form.reset();
        btn.textContent = '✓ Добавлено! Сгенерировать ещё';
        setTimeout(() => { btn.textContent = 'Сгенерировать'; }, 2500);
      } catch (err) {
        console.error(err);
        alert('Ошибка: ' + (err?.message || err));
        btn.textContent = 'Сгенерировать';
      } finally {
        btn.disabled = false;
      }
    });

    document.getElementById('copy').onclick = async () => {
      const b = document.getElementById('copy');
      try {
        await navigator.clipboard.writeText(txt.value);
        const old = b.textContent;
        b.textContent = '✓ Скопировано';
        setTimeout(() => { b.textContent = old; }, 1500);
      } catch (e) {
        txt.select(); document.execCommand('copy');
        b.textContent = '✓ Скопировано';
      }
    };
  </script>
</body>
</html>
